# Backend (FastAPI). Образ собирается из ./backend и должен быть доступен
# кластеру (загружен в kind/minikube или запушен в registry).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: corpai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: corpai-backend:latest
          imagePullPolicy: IfNotPresent
          command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: corpai-config
            - secretRef:
                name: corpai-secret
          volumeMounts:
            - name: uploads
              mountPath: /app/uploaded_files
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              memory: "512Mi"
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: uploads
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: corpai
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
