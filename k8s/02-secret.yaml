# Секреты. В реальном проде — не коммитить, а класть через Sealed Secrets /
# External Secrets / Vault. Здесь stringData для наглядности (k8s закодирует сам).
apiVersion: v1
kind: Secret
metadata:
  name: corpai-secret
  namespace: corpai
type: Opaque
stringData:
  POSTGRES_USER: "corpai"
  POSTGRES_PASSWORD: "corpai"
  POSTGRES_DB: "corpai"
  DATABASE_URL: "postgresql+psycopg2://corpai:corpai@db:5432/corpai"
  RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
