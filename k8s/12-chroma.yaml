# Chroma — векторная база в server-режиме (общая для backend и worker).
# ВАЖНО: тег образа должен совпадать с версией клиента chromadb в образе backend.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: chroma-data
  namespace: corpai
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chroma
  namespace: corpai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chroma
  template:
    metadata:
      labels:
        app: chroma
    spec:
      containers:
        - name: chroma
          image: chromadb/chroma:0.5.23   # = CHROMA_VERSION
          ports:
            - containerPort: 8000
          volumeMounts:
            - name: data
              mountPath: /chroma/chroma
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              memory: "1Gi"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: chroma-data
---
apiVersion: v1
kind: Service
metadata:
  name: chroma
  namespace: corpai
spec:
  selector:
    app: chroma
  ports:
    - port: 8000
      targetPort: 8000
