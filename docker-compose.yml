# Corporate AI Assistant — полный стек одной командой: docker-compose up
#
# Ollama НЕ в compose: она работает на хосте (модели + GPU). Контейнеры
# обращаются к ней через host.docker.internal.
#
# Версия chromadb клиента (в образе backend) и сервера chroma управляется
# единой переменной CHROMA_VERSION из .env — они обязаны совпадать.

# Общее окружение backend и worker (один образ, разные команды).
x-backend-env: &backend-env
  DATABASE_URL: postgresql+psycopg2://corpai:corpai@db:5432/corpai
  RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
  RABBITMQ_QUEUE: document_processing
  CHROMA_MODE: server
  CHROMA_HOST: chroma
  CHROMA_PORT: "8000"
  OLLAMA_BASE_URL: http://host.docker.internal:11434
  LLM_BASE_URL: http://host.docker.internal:11434/v1
  LLM_API_KEY: ollama
  LLM_MODEL: ${LLM_MODEL:-qwen3:14b}
  EMBEDDING_MODEL: nomic-embed-text
  UPLOAD_DIR: /app/uploaded_files

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: corpai
      POSTGRES_PASSWORD: corpai
      POSTGRES_DB: corpai
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U corpai -d corpai"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "15672:15672"   # веб-консоль (guest/guest)
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  chroma:
    image: chromadb/chroma:${CHROMA_VERSION:-0.5.23}
    volumes:
      - chroma_data:/chroma/chroma
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      args:
        CHROMA_VERSION: ${CHROMA_VERSION:-0.5.23}
    image: corpai-backend:latest
    environment: *backend-env
    extra_hosts:
      - "host.docker.internal:host-gateway"   # доступ к Ollama на хосте
    volumes:
      - uploads:/app/uploaded_files
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_started
      chroma:
        condition: service_started
    restart: unless-stopped

  worker:
    # Тот же образ, что и backend — отдельная сборка не нужна.
    image: corpai-backend:latest
    command: ["python", "-m", "workers.document_worker"]
    environment: *backend-env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - uploads:/app/uploaded_files        # общая папка с backend
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      chroma:
        condition: service_started
      backend:
        condition: service_started          # чтобы образ был собран
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    environment:
      BACKEND_URL: http://backend:8000
    ports:
      - "8501:8501"
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

volumes:
  pgdata:
  rabbitmq_data:
  chroma_data:
  uploads:
